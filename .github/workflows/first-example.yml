name: My First Workflow

on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: checkoout repo
          uses: actions/checkout@v6

        - name: List and Read file
          run: |
            echo: "My first Github action job"
            ls -ltra
            cat README.md

        - name: List of files
          run: ls

        - name: Read file
          run: cat README.md

        - name: generate ASCII Artwork
          run: cowsay -f dragon "Run for Cover!, I'm a dragon!.....RAWR" >> dragon.txtk