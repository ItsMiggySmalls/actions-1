name: Exploring variable and Secrets

on:
  push

env:
    CONTAINER_REGISTRY: docker.io
    DOCKER_USERNAME: siddharth1
    IMAGE_NAME: github-actions-nginx

jobs:
  docker:
  runs-on: ubuntu-latest
  steps:
  - name: Docker Build
    run: docker build -t $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME

  - name: Docker login
    env:
      DOCKER_PASSWORD: s3cUrePaSsw0rd
    run: docker login --username=$DOCKER_USERNAME --password=$DOCKER_PASSWORD

  - name: Docker Publish
    run: Docker push docker.io/dockerUsername/ImageName:latest

  
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - name: Docker run
      run: docker run -d -p 8080:80 $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME